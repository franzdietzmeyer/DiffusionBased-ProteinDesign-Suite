# Example Design Pipeline Configuration
# Pre-filled with your actual cluster setup
# Ready to use - just update RFD3 settings JSON and template PDB dir if needed

# ============================================================================
# STAGE 1: RFDiffusion Configuration
# ============================================================================
rfd3:
  settings_json: "/work2/fd55fani-genie3/pipeline_scaffolding/jsons/rfd3_medium_3epi.json"  # UPDATE: Point to your RFD3 settings JSON
  checkpoint: "/work2/fd55fani-genie3/rf3/foundry/checkpoints/rfd3_latest.ckpt"
  batch_size: 1
  n_batches: 1
  inference_sampler_step_scale: 1.5
  foundry_path: "/work2/fd55fani-genie3/rfd3_new/foundry/foundry_new"

# ============================================================================
# STAGE 1: Sequence Design Configuration
# ============================================================================
sequence_design:
  model_type: "soluble"                               # Your setup uses "protein" model
  temperature: 0.1
  seqs_per_backbone: 5                               # Your setting: 5 sequences per backbone
  batch_size: 1
  conda_env: "/work2/fd55fani-conda/ligandmpnn_env"
  ligandmpnn_path: "/work2/fd55fani-genie3/LigandMPNN"

# ============================================================================
# STAGE 2: Structure Prediction & Validation
# ============================================================================
folding_engine:
  engine: "chai"                                    # Your setup uses Chai1

  # Chai1 Configuration (your current setup)
  chai:
    conda_env: "/work2/fd55fani-conda/chai_env"
    recycles: 3
    timesteps: 200
    use_esm_embeddings: true

  # AlphaFold Configuration (alternative - uncomment to use instead of Chai)
  alphafold:
    hpc_module: "AlphaFold"
    data_dir: "/software/databases/alphafold"
    model_preset: "multimer"
    max_template_date: "2022-01-01"

  # Boltz Configuration (single-sequence mode, msa: empty)
  # To use: set engine: "boltz" above
  boltz:
    conda_env: "/work2/fd55fani-conda/boltz203"     # Path to Boltz conda environment
    num_recycles: 4                                 # Boltz recycles parameter

# ============================================================================
# Optional: Sequence Optimization Round
# ============================================================================
sequence_optimization:
  enabled: true                                       # Your setup enables optimization
  temperature: 0.2                                    # Your setting from --mpnn_temperature_optimization
  seqs_per_backbone: 3                               # Your setting from --seqs_per_backbone_optimization

# ============================================================================
# Ligand/Cofactor Configuration
# ============================================================================
ligands:
  smiles_list:
    - "VO4 [O-][V](=O)([O-])[O-]"                    # Format: "NAME SMILES"
  cofactor_name: "VO4"
  min_cofactor_sasa: null                            # null to disable SASA filtering

# ============================================================================
# Filtering Thresholds
# ============================================================================
filters:
  min_plddt_initial: 75.0                            # Your setting: 0.75 → 75%
  min_plddt_final: 80.0                              # Your setting: 0.8 → 80%
  min_motif_plddt: 75.0                              # Your setting: 0.75 → 75%
  max_backbone_rmsd: 2.0                             # Your setting: 2Å
  max_motif_rmsd: 1.5                                # Your setting: 1.5Å
  fixed_residues_json: ""                            # Auto-generated during pipeline (leave empty)

# ============================================================================
# Fixed Residue Configuration
# ============================================================================
fixed_residues:
  template_pdb_dir: ""                                   # Leave empty - fixed residues auto-generated from RFD3

# ============================================================================
# Output & Logging Configuration
# ============================================================================
output:
  work_directory: "/work2/fd55fani-genie3/pipeline_scaffolding/HA_MES_outputs"  # UPDATE: Base working directory for results
  subdirectory: ""                                           # Leave empty to auto-use JSON filename, or specify custom name

  logs_dir: "logs"
  scripts_dir: "scripts"

# ============================================================================
# Hardware & Cluster Configuration
# ============================================================================
hardware:
  partition: "clara"                                 # Partition: "paula" (8x A30) or "clara" (4x V100)
  cpus_per_task: 4
  memory_per_task: "32G"
  gpus_per_task: 1
  time_limit: "24:00:00"

# ============================================================================
# Advanced Options
# ============================================================================
advanced:
  force_rerun_stage: null                            # Force stage rerun: "rfd3", "mpnn", "folding", "analysis"
  keep_intermediate_files: false                     # Keep all intermediate .cif files
  validation_strict: true
  parallel_mpnn_jobs: 1
